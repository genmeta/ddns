# ddns DNS-over-HTTP/3 server configuration
# All fields are optional; the values shown below are the built-in defaults.

# Bind patterns to listen on. Dual-stack service is expressed explicitly.
binds = ["0.0.0.0:4433", "[::]:4433"]

# TLS server name (SNI).
server_name = "dns.genmeta.net"

# Paths to the server TLS certificate and private key (PEM format).
cert = "~/Downloads/ssl/dns.genmeta.net/dns.genmeta.net.pem"
key = "~/Downloads/ssl/dns.genmeta.net/dns.genmeta.net.key"

# Root CA that signed the client certificates (PEM format).
root_cert = "~/Downloads/ssl/root.crt"

# Allowed host suffixes. Values are normalized and suffix-matched.
# host_allowlist = ["genmeta.net"]

# Optional issuer certificate used to build OCSP requests when `cert` only
# contains the leaf certificate. If `cert` already contains the full chain,
# this can be omitted.
# ocsp_issuer_cert = "~/Downloads/ssl/intermediate.crt"

# Public cert-server OCSP responder. The server refreshes its stapled OCSP
# response immediately on startup and then every 2h55m (cert-server TTL is 3h,
# refreshed 5 minutes early).
# ocsp_responder_base_url = "https://license.genmeta.net"

# Whether to require RFC 9530/9421-style packet signatures on Standard domains.
# RFC 9530 defines `Content-Digest`; RFC 9421 defines `Signature-Input` and
# `Signature`. Signed publish requests keep the DNS packet as the HTTP body and
# provide:
#   Content-Digest: sha-256=:...:
#   Signature-Input: dns=("content-digest");created=...;keyid="sha256:<leaf-fp>";alg="..."
#   Signature: dns=:...:
require_signature = true

# Default TTL (seconds) for published records.
ttl_secs = 30

# Redis primary URL for persistent storage.
# If omitted, records are kept in memory only (lost on restart).
# redis_write_url = "redis://primary.example:6379/0"
#
# Optional Redis read URL for lookup traffic. Defaults to the write URL when
# omitted, but on AWS this is usually a regional replica / reader endpoint.
# redis_read_url = "redis://replica.example:6379/0"
#
# When Redis storage is enabled, lookups check the external blacklist set
# "ddns:blacklist". Without Redis, this file can preload an in-memory blacklist.
# Members are normalized lowercase ASCII host names. Blacklisted lookups return
# 404; publish/clear requests are not blocked.
#
#   redis-cli SADD ddns:blacklist blocked.example.genmeta.net
#   redis-cli SREM ddns:blacklist blocked.example.genmeta.net
#
# blacklist = ["blocked.example.genmeta.net"]

# Enable GEO-aware scheduling based on country / ASN.
# When both databases are configured, city-distance tie-breaking is also enabled
# for sufficiently accurate records.
# geoip_city_db = "/etc/ddns/GeoLite2-City.mmdb"
# geoip_asn_db = "/etc/ddns/GeoLite2-ASN.mmdb"

# ---------------------------------------------------------------------------
# Domain policy rules
#
# Policies are matched in order; the first matching rule wins.
# Domains not listed here use the built-in "standard" policy.
#
# Policies:
#   standard   — one record per host; client cert SAN must match the target
#                host; signature check controlled by require_signature above;
#                each publish overwrites the previous record.
#
#   open_multi — any authenticated node may publish; no signature check;
#                records are appended (not overwritten), each with its own
#                individual TTL; lookup returns newest-first, use ?limit=N
#                to cap the number of returned records.
# ---------------------------------------------------------------------------

[[domain_policies]]
host = "nat.genmeta.net"
policy = "open_multi"


# Static bootstrap STUN endpoints returned even before any node publishes.
# Ordering keeps the main :20002 endpoints ahead of the auxiliary :20003 endpoints.
[[seed_records]]
host = "nat.genmeta.net"
endpoints = []

# Add more rules as needed, e.g.:
# [[domain_policies]]
# host   = "relay.genmeta.net"
# policy = "open_multi"

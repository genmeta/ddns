[package]
name = "ddns"
version = "0.2.0"
edition = "2024"
autoexamples = false

[dependencies]
base64 = "0.22"
bitfield-struct = "0.10"
bytes = "1"
dashmap = "6"
dhttp-identity = { git = "ssh://git@github.com/genmeta/dhttp.git", branch = "main" }
dquic = { git = "ssh://git@github.com/genmeta/dquic.git", branch = "feat/v0.5.1" }
flume = "0.12"
futures = "0.3"
libc = "0.2"
nom = "8"
rand = "0.9"
ring = "0.17"
rustls = { version = "0.23", default-features = false, features = ["logging", "ring"] }
rustls-pemfile = "2"
snafu = "0.8"
socket2 = { version = "0.5.8", features = ["all"] }
tokio = { version = "1", features = ["time", "macros", "net", "sync", "rt", "rt-multi-thread", "io-util"] }
tracing = "0.1"
x509-parser = "0.18"

h3x = { git = "https://github.com/genmeta/h3x.git", branch = "endpoint", default-features = false, optional = true }
http = { version = "1", optional = true }
http-body = { version = "1", optional = true }
http-body-util = { version = "0.1", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["charset", "rustls-tls", "http2", "macos-system-configuration", "json"], optional = true }
url = { version = "2", optional = true }

clap = { version = "4", features = ["derive"], optional = true }
deadpool-redis = { version = "0.23", optional = true }
idna = { version = "1", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
toml = { version = "0.8", optional = true }
tower-service = { version = "0.3", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

[features]
default = []
h3x-resolver = [
    "dep:h3x",
    "h3x/dquic",
    "h3x/hyper",
    "dep:http",
    "dep:http-body",
    "dep:http-body-util",
    "dep:url",
]
mdns-resolver = ["dep:h3x", "h3x/dquic"]
http-resolver = ["dep:reqwest"]
server = [
    "h3x-resolver",
    "dep:clap",
    "dep:deadpool-redis",
    "dep:idna",
    "dep:serde",
    "dep:toml",
    "dep:tower-service",
    "dep:tracing-subscriber",
]

[dev-dependencies]
clap = { version = "4", features = ["derive"] }
h3x = { git = "https://github.com/genmeta/h3x.git", branch = "endpoint", default-features = false, features = ["dquic"] }
idna = "1"
rustls-pki-types = "1"
shellexpand = "3"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "ddns-server"
path = "src/bin/ddns-server/main.rs"
required-features = ["server"]

[[example]]
name = "mdns_discover"
path = "examples/mdns_discover.rs"

[[example]]
name = "mdns_query"
path = "examples/mdns_query.rs"

[[example]]
name = "publish"
path = "examples/publish.rs"
required-features = ["h3x-resolver"]

[[example]]
name = "query"
path = "examples/query.rs"
required-features = ["h3x-resolver"]

[patch.crates-io]
proc-macro-error2 = { path = "patches/proc-macro-error2" }
